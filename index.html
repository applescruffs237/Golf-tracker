function renderFingerprint() {
  const root = document.getElementById('screen-fingerprint');
  const bundle = state.selectedBundle || 'all';
  const bundleSessions = sessionsForBundle(bundle);
  const allClubs = [...new Set(bundleSessions.flatMap(s=>s.clubsUsed))].sort((a,b)=>sortClub(a)-sortClub(b));
  if(!allClubs.length) {
    root.innerHTML=`<div class="card"><div class="empty">No sessions in this window.</div></div>`;
    return;
  }
  const selClub = allClubs.includes(state.selectedClubByScreen.fingerprint) ? state.selectedClubByScreen.fingerprint : allClubs[0];
  state.selectedClubByScreen.fingerprint = selClub;
  const allShots = shotsForBundleAndClub(bundle, selClub);
  const stats = computeStats(allShots, selClub, clubMode(selClub)==='performance'?state.calibrationView:'raw');
  const sessionCount = bundleSessions.filter(s=>s.shots.some(sh=>sh.club===selClub)).length;

  root.innerHTML = `
    <div class="card">
      <div class="t-head" style="font-size:24px;margin-bottom:12px;">My Game</div>
      <div class="club-tabs">
        ${allClubs.map(c=>`<button class="club-tab ${c===selClub?'active':''}" data-fclub="${c}">${c}</button>`).join('')}
      </div>
    </div>
    ${renderFingerprintCard(stats, sessionCount)}
    ${stats.mode==='performance' ? renderGappingCard(bundle) : ''}
    ${stats.mode==='performance' ? renderInsightCards(stats) : renderDirInsightCard(stats)}
  `;
  document.querySelectorAll('[data-fclub]').forEach(b=>b.onclick=()=>{state.selectedClubByScreen.fingerprint=b.dataset.fclub;render();});
}

function renderFingerprintCard(stats, sessionCount) {
  const fp = stats.fp;
  const r  = stats.recipe;
  const view = stats.mode==='performance'?state.calibrationView:'raw';
  const isPerf = stats.mode==='performance';
  const rangeVal = (lo,hi,d=0,suf='') => isFinite(lo)&&isFinite(hi) ? `${fmt(lo,d)}–${fmt(hi,d)}${suf}` : '—';

  if (!isPerf) {
    return `<div class="card">
      <div class="t-label" style="margin-bottom:4px;">Fingerprint · ${stats.club}</div>
      <div style="font-family:var(--mono);font-size:11px;color:var(--text2);margin-bottom:12px;">${sessionCount} session${sessionCount!==1?'s':''} · ${stats.total} shots</div>
      <div class="fp-block">
        <div class="fp-row"><span class="fp-label">Start direction</span><span class="fp-value">${isFinite(fp.startLo)&&isFinite(fp.startHi)?`${fmtDir(fp.startLo,1)} to ${fmtDir(fp.startHi,1)}`:'—'}</span></div>
        <div class="fp-row"><span class="fp-label">Club path</span><span class="fp-value">${rangeVal(fp.pathLo,fp.pathHi,1,'°')}</span></div>
        <div class="fp-row"><span class="fp-label">Face angle</span><span class="fp-value">${rangeVal(fp.faceLo,fp.faceHi,1,'°')}</span></div>
      </div>
    </div>`;
  }

  const shapeLabel = (() => {
    if (!isFinite(r?.ftpMed)||!isFinite(r?.pathMed)) return null;
    const ftp = r.ftpMed, path = r.pathMed;
    if (ftp < -2.5) return 'Strong draw';
    if (ftp >= -2.5 && ftp < -0.5 && path > 0) return 'Controlled draw';
    if (ftp >= -0.5 && ftp <= 0.5) return 'Straight';
    if (ftp > 0.5 && ftp <= 2.5 && path < 0) return 'Controlled fade';
    if (ftp > 2.5) return 'Strong fade';
    return 'Mixed shape';
  })();

  const conBadge = (std) => {
    if (!isFinite(std)) return '';
    const label = std<=1?'tight':std<=2?'moderate':'variable';
    const col = std<=1?'var(--great)':std<=2?'var(--playable)':'var(--miss)';
    return `<span style="font-family:var(--mono);font-size:9px;color:${col};margin-left:6px;">${label}</span>`;
  };

  return `<div class="card">
    <div class="row" style="align-items:flex-start;margin-bottom:14px;">
      <div>
        <div class="t-label" style="margin-bottom:3px;">Stock shot recipe · ${stats.club}</div>
        <div style="font-family:var(--mono);font-size:11px;color:var(--text2);">${sessionCount} session${sessionCount!==1?'s':''} · ${r?.count||0} qualifying shots</div>
      </div>
      ${shapeLabel ? `<div style="font-family:var(--head);font-weight:700;font-size:13px;letter-spacing:.04em;color:var(--accent2);text-align:right;line-height:1.2;">${esc(shapeLabel)}</div>` : ''}
    </div>
    ${r && r.count >= 3 ? `
    <div style="background:var(--surface2);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:12px;margin-bottom:10px;">
      <div class="t-label" style="margin-bottom:10px;"></div>
      <div class="g2">
        <div style="padding:8px 0;border-bottom:1px solid var(--border);">
          <div style="font-family:var(--mono);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px;">Club path</div>
          <div style="font-family:var(--mono);font-size:17px;font-weight:600;">${fmt(r.pathMed,1)}°${conBadge(r.pathStd)}</div>
          <div style="font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:2px;">${r.pathMed>0.5?'In-to-out':r.pathMed<-0.5?'Out-to-in':'Neutral'}</div>
        </div>
        <div style="padding:8px 0;border-bottom:1px solid var(--border);">
          <div style="font-family:var(--mono);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px;">Face angle</div>
          <div style="font-family:var(--mono);font-size:17px;font-weight:600;">${fmt(r.faceMed,1)}°${conBadge(r.faceStd)}</div>
          <div style="font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:2px;">${r.faceMed>0.3?'Open':r.faceMed<-0.3?'Closed':'Square'}</div>
        </div>
        <div style="padding:8px 0;border-bottom:1px solid var(--border);">
          <div style="font-family:var(--mono);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px;">Face-to-path</div>
          <div style="font-family:var(--mono);font-size:17px;font-weight:600;">${fmt(r.ftpMed,1)}°${conBadge(r.ftpStd)}</div>
          <div style="font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:2px;">${r.ftpMed<-0.5?'Closed to path — draws':r.ftpMed>0.5?'Open to path — fades':'Matched — straight'}</div>
        </div>
        <div style="padding:8px 0;border-bottom:1px solid var(--border);">
          <div style="font-family:var(--mono);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px;">Attack angle</div>
          <div style="font-family:var(--mono);font-size:17px;font-weight:600;">${isFinite(r.aaMed)?fmt(r.aaMed,1)+'°':'—'}${conBadge(r.aaStd)}</div>
          <div style="font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:2px;">${isFinite(r.aaMed)?(r.aaMed<-2?'Descending — good for irons':r.aaMed>0?'Ascending':'Shallow'):'—'}</div>
        </div>
        <div style="padding:8px 0;">
          <div style="font-family:var(--mono);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px;">Start direction</div>
          <div style="font-family:var(--mono);font-size:17px;font-weight:600;">${fmtDir(r.startMed,1)}</div>
          <div style="font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:2px;">Typical start line</div>
        </div>
        <div style="padding:8px 0;">
          <div style="font-family:var(--mono);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px;">Carry</div>
          <div style="font-family:var(--mono);font-size:17px;font-weight:600;">${fmt(r.carryMed,0)} yd</div>
          <div style="font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:2px;">Stock distance</div>
        </div>
      </div>
      <div style="margin-top:12px;padding-top:10px;border-top:1px solid var(--border);font-family:var(--mono);font-size:10px;color:var(--muted);line-height:1.6;">
         path ${fmt(r.pathMed,1)}° · face ${fmt(r.faceMed,1)}° · AA ${isFinite(r.aaMed)?fmt(r.aaMed,1)+'°':'—'} · start ${fmtDir(r.startMed,1)}
      </div>
    </div>` : `<div style="font-family:var(--mono);font-size:12px;color:var(--muted);padding:10px 0;">Hit more Great and Stock shots to build your recipe — need at least 3.</div>`}
    <div class="fp-block">
      <div class="fp-row"><span class="fp-label">Carry range</span><span class="fp-value">${rangeVal(fp.carryLo,fp.carryHi,0,' yd')}</span></div>
      <div class="fp-row"><span class="fp-label">Ball speed</span><span class="fp-value">${rangeVal(fp.bsLo,fp.bsHi,1,' mph')}</span></div>
      <div class="fp-row"><span class="fp-label">Max offline</span><span class="fp-value">≤ ${fmt(fp.offHi,1)} yd</span></div>
      <div class="fp-row"><span class="fp-label">Path range</span><span class="fp-value">${rangeVal(fp.pathLo,fp.pathHi,1,'°')}</span></div>
      <div class="fp-row"><span class="fp-label">Face range</span><span class="fp-value">${rangeVal(fp.faceLo,fp.faceHi,1,'°')}</span></div>
      <div class="fp-row"><span class="fp-label">Face-to-path</span><span class="fp-value">${rangeVal(fp.ftpLo,fp.ftpHi,1,'°')}</span></div>
      <div class="fp-row"><span class="fp-label">Median total</span><span class="fp-value">${fmt(stats.totalMed,0)} yd</span></div>
    </div>
    <div style="font-family:var(--mono);font-size:9px;color:var(--muted);margin-top:6px;">IQR ranges from Great &amp; Stock shots · ${state.calibrationView==='calibrated'?'On course figures':'Raw foam ball figures'}</div>
  </div>`;
}

function renderGappingCard(bundle='all') {
  const bundleSessions = sessionsForBundle(bundle);
  const perfClubs = [...new Set(bundleSessions.flatMap(s=>s.clubsUsed.filter(c=>clubMode(c)==='performance')))].sort((a,b)=>sortClub(a)-sortClub(b));
  if(perfClubs.length<2) return '';
  const rows = perfClubs.map(c=>{
    const shots = shotsForBundleAndClub(bundle, c);
    const st = computeStats(shots, c, state.calibrationView);
    return { club:c, carry:st.carryMed, bs:st.bsMed, total:st.totalMed };
  });
  const bundleLabel = BUNDLES.find(b=>b.key===bundle)?.label || 'All time';
  return `<div class="card">
    <div class="t-label" style="margin-bottom:10px;">Estimated gapping · ${esc(bundleLabel)}</div>
    <div style="overflow-x:auto;">
      <table class="gap-table">
        <thead><tr><th>Club</th><th>Carry</th><th>Total</th><th>Ball spd</th></tr></thead>
        <tbody>
          ${rows.map(r=>`<tr>
            <td style="font-weight:600;">${r.club}</td>
            <td>${fmt(r.carry,0)} yd</td>
            <td>${fmt(r.total,0)} yd</td>
            <td>${fmt(r.bs,1)} mph</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>
    <div style="font-size:11px;color:var(--muted);margin-top:8px;font-family:var(--mono);">${state.calibrationView==='calibrated'?'On course figures.':'Raw foam ball figures — toggle On course for on-course estimate.'}</div>
  </div>`;
}

function renderInsightCards(stats) {
  const strike = buildStrikeInsight(stats);
  const face   = buildFaceInsight(stats);
  const lp     = buildLowPointInsight(stats);
  const sc = s => s.signal==='positive'?'ic-positive':s.signal==='warning'?'ic-warning':'ic-alert';
  return `
    <div class="card">
      <div class="t-label" style="margin-bottom:12px;">Actionable insights · ${stats.club}</div>
      <div style="display:flex;flex-direction:column;gap:8px;">
        <div class="insight-card ${sc(strike)}"><div class="ic-tag">Contact consistency</div><div class="ic-title">${esc(strike.title)}</div><div class="ic-body">${esc(strike.body)}</div></div>
        <div class="insight-card ${sc(lp)}"><div class="ic-tag">Low-point control</div><div class="ic-title">${esc(lp.title)}</div><div class="ic-body">${esc(lp.body)}</div></div>
        <div class="insight-card ${sc(face)}"><div class="ic-tag">Face &amp; path</div><div class="ic-title">${esc(face.title)}</div><div class="ic-body">${esc(face.body)}</div></div>
      </div>
    </div>`;
}

function renderDirInsightCard(stats) {
  const good = pctNum(stats.byGrade.good||0,stats.total);
  const sig = good>=50?'ic-positive':good>=30?'ic-warning':'ic-alert';
  return `<div class="card">
    <div class="t-label" style="margin-bottom:12px;">Direction insight · ${stats.club}</div>
    <div class="insight-card ${sig}">
      <div class="ic-tag">Start direction control</div>
      <div class="ic-title">${good>=50?'Direction holding well':good>=30?'Improving but inconsistent':'High miss rate on start direction'}</div>
      <div class="ic-body">Good reps at ${pctStr(stats.byGrade.good||0,stats.total)}. Median start ${fmtDir(stats.startMed,1)}. Tighten the start window to ≤ ${state.settings.directionalThresholds.good}° to improve the pattern.</div>
    </div>
  </div>`;
}

function buildStrikeInsight(stats) {
  if (!stats || stats.total < 8) return {signal:'warning', title:'Not enough shots yet', body:'Hit a few more to build a contact benchmark.'};
  if (!isFinite(stats.bsCV)) return {signal:'warning', title:'Ball speed data missing', body:'Ball speed data needed to assess contact consistency.'};
  const cv = stats.bsCV, med = stats.bsMed;
  if (cv <= 3) return {signal:'positive', title:'Contact very consistent', body:`Ball speed CV ${fmt(cv,1)}% — finding the centre of the face reliably. Median ${fmt(med,1)} mph.`};
  if (cv <= 5) return {signal:'positive', title:'Contact holding well', body:`Ball speed CV ${fmt(cv,1)}% — small spread. A few outliers but the pattern is solid. Median ${fmt(med,1)} mph.`};
  if (cv <= 8) return {signal:'warning', title:'Contact a little variable', body:`Ball speed CV ${fmt(cv,1)}% — some shots losing speed vs your median of ${fmt(med,1)} mph. Check for thin or off-centre contact.`};
  return {signal:'alert', title:'Contact inconsistent', body:`Ball speed CV ${fmt(cv,1)}% — significant spread around median ${fmt(med,1)} mph. Off-centre contact is costing distance and reliability.`};
}

function buildLowPointInsight(stats) {
  if (!stats || stats.total < 8) return {signal:'warning', title:'Not enough shots yet', body:'More shots needed for low-point analysis.'};
  const lp = stats.lp;
  if (!lp || !isFinite(lp.target)) return {signal:'warning', title:'Attack angle data missing', body:'Attack angle data needed to assess low-point control.'};
  const shallow = lp.shallowPct != null && lp.shallowPct >= 25;
  const steep   = lp.steepPct   != null && lp.steepPct   >= 25;
  const clean   = lp.cleanPct   != null && lp.cleanPct   >= 50;
  const window  = `${fmt(lp.low,1)}° to ${fmt(lp.high,1)}°`;
  if (clean) return {signal:'positive', title:'Low point well controlled', body:`${lp.cleanPct}% of shots in your strike window (${window}). Target AA ${fmt(lp.target,1)}°. Keep this pattern.`};
  if (shallow) return {signal:'alert', title:'Low point drifting back', body:`${lp.shallowPct}% of shots are too shallow — club bottoming out before the ball. Return attack angle into ${window}.`};
  if (steep) return {signal:'alert', title:'Getting steep', body:`${lp.steepPct}% of shots steeper than your window. Bring attack angle back toward ${fmt(lp.target,1)}° (${window}).`};
  if (isFinite(stats.aaStd) && stats.aaStd >= 2.5) return {signal:'warning', title:'Low point wandering', body:`Attack angle varying shot to shot (σ ${fmt(stats.aaStd,1)}°). Aim to repeat entry angle near ${fmt(lp.target,1)}° consistently.`};
  return {signal:'warning', title:'Strike window building', body:`Target AA ${fmt(lp.target,1)}° · window ${window} · ${lp.cleanPct}% clean so far. Keep accumulating data.`};
}

function buildFaceInsight(stats) {
  if(!stats||stats.total<8||!isFinite(stats.pathMed)||!isFinite(stats.faceMed)) return {signal:'warning',title:'Not enough shots yet',body:'More shots needed to build face-control insight.'};
  const r = stats.recipe;
  const ftp=stats.ftpMed, path=stats.pathMed, face=stats.faceMed, off=stats.absOffMed??99;
  const playPct=(((stats.byGrade.great||0)+(stats.byGrade.stock||0)+(stats.byGrade.playable||0))/stats.total)*100;
  const tight=playPct>=55&&off<=12;
  const startDrift = isFinite(stats.startMed) ? stats.startMed : 0;
  const recipeRef = r&&r.count>=3 ? ` Your recipe: path ${fmt(r.pathMed,1)}°, face ${fmt(r.faceMed,1)}°, F2P ${fmt(r.ftpMed,1)}°.` : '';
  if(tight&&ftp>=-2&&ftp<=0&&path>=0&&path<=3) return {signal:'positive',title:'Controlled draw pattern',body:`Face ${fmt(ftp,1)}° closed to path with in-to-out path at ${fmt(path,1)}°. Ball starting ${fmtDir(startDrift,1)} then drawing back.${recipeRef} Repeat this relationship.`};
  if(tight&&ftp>=0&&ftp<=2&&path<=-0&&path>=-3) return {signal:'positive',title:'Controlled fade pattern',body:`Face ${fmt(ftp,1)}° open to path with out-to-in path at ${fmt(path,1)}°. Ball starting ${fmtDir(startDrift,1)} then fading.${recipeRef} Repeat this relationship.`};
  if(tight&&Math.abs(ftp)<=1&&Math.abs(path)<=1.5) return {signal:'positive',title:'Face and path well matched',body:`Path ${fmt(path,1)}°, face ${fmt(face,1)}°, face-to-path ${fmt(ftp,1)}° — neutral, straight pattern.${recipeRef}`};
  if(ftp>2.5||(ftp>1.5&&off>10)) return {signal:'alert',title:'Face too open to path',body:`Face-to-path at ${fmt(ftp,1)}°. Push-fade pattern. Close the face relative to path — aim for F2P near ${isFinite(r?.ftpMed)?fmt(r.ftpMed,1)+'°':'0°'}.`};
  if(ftp<-2.5||(ftp<-1.5&&startDrift<-1)) return {signal:'alert',title:'Face too closed to path',body:`Face-to-path at ${fmt(ftp,1)}°. Pull-draw or hook pattern. Open the face slightly — aim for F2P near ${isFinite(r?.ftpMed)?fmt(r.ftpMed,1)+'°':'0°'}.`};
  if(Math.abs(path)>4) return {signal:'warning',title:'Path needs attention',body:`Path at ${fmt(path,1)}° is quite ${path>0?'in-to-out':'out-to-in'}. Bring path closer to neutral to tighten dispersion.`};
  return {signal:'warning',title:'Face control inconsistent',body:`Face-to-path median ${fmt(ftp,1)}° but varying shot to shot. Focus on repeating the same face-to-path relationship.${recipeRef}`};
}

      ftpIQR: isFinite(pct(ftpVals,.75))&&isFinite(pct(ftpVals,.25)) ? pct(ftpVals,.75)-pct(ftpVals,.25) : null,
      aaLo: pct(aaVals,.25), aaHi: pct(aaVals,.75), aaMed: median(aaVals),

      : `<div class="g2">

              + sparkCard('Median abs offline', points.map(p=>p.absOff), points.map(p=>p.label), ' yd', false)
            : sparkCard('Good reps', points.map(p=>p.goodRepPct), points.map(p=>p.label), '%', true)

          }
          ${isPerf ? sparkCard('Stock+', points.map(p=>p.stockPct), points.map(p=>p.label), '%', true)

function sparkCard(title, values, labels, suffix='', higherBetter=true) {
  const finite = values.filter(isFinite);
  if(!finite.length) return `<div class="progress-card"><div class="pc-label">${esc(title)}</div><div class="pc-value">—</div></div>`;
  const latest = finite[finite.length-1], first = finite[0];
  const delta = isFinite(latest)&&isFinite(first) ? latest-first : null;
  const improving = delta===null ? null : higherBetter ? delta>0 : delta<0;
  const deltaClass = improving===null?'delta-flat':improving?'delta-up':'delta-down';
  const pts = sparkPoints(values, 280, 80, 14);
  return `<div class="progress-card">
    <div class="pc-label">${esc(title)}</div>
    <div class="pc-value">${fmt(latest,0)}${suffix}</div>
    <div class="pc-delta ${deltaClass}">${delta===null?'—':`${delta>0?'↑':'↓'} ${fmt(Math.abs(delta),0)}${suffix} vs first`}</div>
    <svg viewBox="0 0 280 80" style="width:100%;display:block;margin-top:8px;">
      <polyline points="${pts.line}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      ${pts.dots}
    </svg>
  </div>`;
}

function sparkPoints(values, W, H, pad) {
  const finite = values.filter(isFinite);
  if(!finite.length) return {line:'',dots:''};
  const mn=Math.min(...finite), mx=Math.max(...finite), span=mx-mn||1;
  const coords = values.map((v,i)=>{
    if(!isFinite(v)) return null;
    const x=pad+(i/Math.max(1,values.length-1))*(W-pad*2);
    const y=H-pad-((v-mn)/span)*(H-pad*2);
    return {x,y};
  }).filter(Boolean);
  return {
    line: coords.map(p=>`${p.x},${p.y}`).join(' '),
    dots: coords.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="3" fill="var(--accent)"/>`).join('')
  };
}

function renderCorridorChart(points, loKey, hiKey, medKey, label) {
  const W=560,H=220,pL=48,pR=16,pT=24,pB=38;
  const n = points.length; if(n<2) return '';
  const loVals=points.map(p=>p[loKey]).filter(isFinite), hiVals=points.map(p=>p[hiKey]).filter(isFinite), medVals=points.map(p=>p[medKey]).filter(isFinite);
  if(!loVals.length) return '';
  const allV=[...loVals,...hiVals,...medVals];
  const vMin=Math.min(...allV)-0.5, vMax=Math.max(...allV)+0.5;
  const xs=i=>pL+(i/(n-1))*(W-pL-pR);
  const ys=v=>pT+(H-pT-pB)*(1-(v-vMin)/(vMax-vMin));
  const bandPts=points.map((p,i)=>isFinite(p[hiKey])?`${xs(i)},${ys(p[hiKey])}`:'').filter(Boolean).join(' ')
    +' '+[...points].reverse().map((p,i)=>isFinite(p[loKey])?`${xs(n-1-i)},${ys(p[loKey])}`:'').filter(Boolean).join(' ');
  const medLine=points.map((p,i)=>isFinite(p[medKey])?`${xs(i)},${ys(p[medKey])}`:'').filter(Boolean).join(' ');
  const firstW=isFinite(points[0][hiKey])&&isFinite(points[0][loKey])?points[0][hiKey]-points[0][loKey]:null;
  const lastW=isFinite(points[n-1][hiKey])&&isFinite(points[n-1][loKey])?points[n-1][hiKey]-points[n-1][loKey]:null;
  const narrowPct=isFinite(firstW)&&isFinite(lastW)&&firstW>0?Math.round((1-lastW/firstW)*100):null;
  let gridLines='';
  const step=(vMax-vMin)/4;
  for(let i=0;i<=4;i++){const v=vMin+i*step,ly=ys(v);gridLines+=`<line x1="${pL}" y1="${ly}" x2="${W-pR}" y2="${ly}" stroke="#1e1e2a" stroke-width="1"/><text x="${pL-6}" y="${ly+4}" fill="#6a6a80" font-size="9" text-anchor="end">${fmt(v,1)}°</text>`;}
  return `<div class="card" style="padding:14px;margin-bottom:10px;">
    <div class="row" style="margin-bottom:12px;">
      <div class="t-label">${esc(label)} · corridor</div>
      ${narrowPct!==null?`<div style="font-family:var(--mono);font-size:10px;color:${narrowPct>0?'var(--great)':'var(--miss)'};">${narrowPct>0?'↓':'↑'}${Math.abs(narrowPct)}% ${narrowPct>0?'tighter':'wider'}</div>`:''}
    </div>
    <div class="plot-wrap">
      <svg viewBox="0 0 ${W} ${H}" style="width:100%;display:block;">
        <rect width="${W}" height="${H}" fill="#060810"/>
        ${gridLines}
        <line x1="${pL}" y1="${ys(0)}" x2="${W-pR}" y2="${ys(0)}" stroke="#2a3550" stroke-width="1" stroke-dasharray="4 3"/>
        <polygon points="${bandPts}" fill="rgba(61,126,255,.12)"/>
        <polyline points="${medLine}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        ${points.map((p,i)=>isFinite(p[medKey])?`<circle cx="${xs(i)}" cy="${ys(p[medKey])}" r="3.5" fill="var(--accent)" stroke="#060810" stroke-width="1.5"/>`:'').join('')}
        ${points.map((p,i)=>`<text x="${xs(i)}" y="${H-pB+16}" fill="#4a5468" font-size="8" text-anchor="middle">${esc(p.label)}</text>`).join('')}
      </svg>
    </div>
    <div style="display:flex;gap:8px;margin-top:8px;font-family:var(--mono);font-size:10px;color:var(--muted);">
      <span style="display:flex;align-items:center;gap:5px;"><span style="width:20px;height:8px;background:rgba(61,126,255,.2);border-radius:2px;display:inline-block;"></span>IQR band</span>
      <span style="display:flex;align-items:center;gap:5px;"><span style="width:16px;height:2px;background:var(--accent);display:inline-block;"></span>Median</span>
    </div>
  </div>`;
}

function readFileText(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = ev => resolve(ev.target.result || '');
    reader.onerror = () => reject(new Error(`Could not read ${file.name}`));
    reader.readAsText(file);
  });
}

async function handleImport(e) {
  const files = Array.from(e.target.files || []);
  if (!files.length) return;

  try {
    const jsonFiles = files.filter(f => f.name.toLowerCase().endsWith('.json'));
    if (jsonFiles.length > 1 || (jsonFiles.length === 1 && files.length > 1)) {
      throw new Error('Import either one backup JSON or one or more CSV sessions.');
    }

    if (jsonFiles.length === 1) {
      const raw = await readFileText(jsonFiles[0]);
      const p = JSON.parse(raw || '{}');
      if (!p.state) throw new Error('Not a valid backup.');
      state = deepMerge(clone(DEFAULTS), p.state);
      currentTab = 'sessions';
      render();
      return;
    }

    const imported = [];
    for (const file of files) {
      const raw = await readFileText(file);
      const session = parseCsv(raw, file.name);
      imported.push(session);
    }

    if (imported.length) {
      state.sessions.push(...imported);
      state.sessions.sort((a,b)=>new Date(a.date)-new Date(b.date)||(a.importedAt||'').localeCompare(b.importedAt||''));
      state.selectedSessionId = imported[imported.length - 1].id;
      currentTab = 'sessions';
      render();
    }
  } catch (err) {
    alert(`Import failed: ${err.message}`);
  } finally {
    e.target.value = '';
  }
}
function exportBackup() {
  const blob = new Blob([JSON.stringify({appVersion:APP.VERSION,exportedAt:new Date().toISOString(),state},null,2)],{type:'application/json'});
  const a = Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:APP.EXPORT_FILENAME()});
  a.click(); URL.revokeObjectURL(a.href);
}
async function clearData() {
  const ok = await confirmDialog('Clear all data?','This will remove all sessions and reset to defaults on this device.','Clear','danger');
  if(!ok) return;
  localStorage.removeItem(APP.STORAGE_KEY);
  state = clone(DEFAULTS);
  render();
}

async function deleteSession(sessionId) {
  const session = state.sessions.find(s => s.id === sessionId);
  if (!session) return;
  const ok = await confirmDialog('Delete this session?', `${fmtDate(session.date)} · ${session.shots.length} shots will be removed.`, 'Delete', 'danger');
  if (!ok) return;
  state.sessions = state.sessions.filter(s => s.id !== sessionId);
  const remaining = [...state.sessions].sort((a,b)=>new Date(b.date)-new Date(a.date)||(b.importedAt||'').localeCompare(a.importedAt||''));
  state.selectedSessionId = remaining[0]?.id || null;
  render();
}

function openShotModal(sid, club, idx) {
  const session = state.sessions.find(s=>s.id===sid)||state.sessions.find(s=>s.shots.some(sh=>sh.club===club&&sh.index===+idx));
  if(!session) return;
  const shot = session.shots.find(s=>s.club===club&&s.index===+idx);
  if(!shot) return;
  const mode = clubMode(club);
  const classified = mode==='performance' ? classifyPerf(session.shots.filter(s=>s.club===club),state.calibrationView) : classifyDir(session.shots.filter(s=>s.club===club));
  const cs = classified.find(s=>s.index===+idx)||shot;
  const view = mode==='performance'?state.calibrationView:'raw';
  const rows = [
    ['Grade',gradeChip(cs.grade)],['Ball speed',`${fmt(getMetric(cs,'ballSpeed',view),1)} mph`],
    ['Carry',`${fmt(getMetric(cs,'carry',view),0)} yd`],['Total',`${fmt(getMetric(cs,'total',view),0)} yd`],
    ['Offline',fmtDir(cs.offline,1).replace('°',' yd')],['Start dir',fmtDir(cs.startDirection,1)],
    ['Launch angle',`${fmt(cs.launchAngle,1)}°`],['Spin rate',`${fmt(cs.spinRate,0)} rpm`],
    ['Attack angle',isFinite(cs.attackAngle)?`${fmt(cs.attackAngle,1)}°`:'—'],
    ['Club path',isFinite(cs.clubPath)?`${fmt(cs.clubPath,1)}°`:'—'],
    ['Face angle',isFinite(cs.faceAngle)?`${fmt(cs.faceAngle,1)}°`:'—'],
    ['Face-to-path',isFinite(faceToPath(cs))?`${fmt(faceToPath(cs),1)}°`:'—'],
  ];
  document.getElementById('modalTitle').textContent = `${club} · Shot ${+idx+1}`;
  document.getElementById('modalBody').innerHTML = `<div class="g2">${rows.map(([l,v])=>`<div class="mtile"><div class="ml">${esc(l)}</div><div class="mv" style="font-size:16px;">${v}</div></div>`).join('')}</div>`;
  document.getElementById('modalBackdrop').classList.add('open');
}
window.openShotModal = openShotModal;
document.getElementById('closeModal').onclick = ()=>document.getElementById('modalBackdrop').classList.remove('open');
document.getElementById('modalBackdrop').onclick = e=>{ if(e.target.id==='modalBackdrop') document.getElementById('modalBackdrop').classList.remove('open'); };

document.addEventListener('click', e=>{
  const t = e.target.closest('[data-shot-open]');
  if(t) openShotModal(t.dataset.sid, t.dataset.club, t.dataset.idx);
  const sc = e.target.closest('[data-sclub]');
  if(sc) { state.selectedClubByScreen.sessions = sc.dataset.sclub; state.selectedGradeFilter = 'all'; render(); }
  const gf = e.target.closest('[data-grade-filter]');
  if(gf) { state.selectedGradeFilter = gf.dataset.gradeFilter; render(); }
  const ds = e.target.closest('[data-delete-session]');
  if(ds) deleteSession(ds.dataset.deleteSession);
});

let _confirmResolve = null;
function confirmDialog(title, body, label='Confirm', variant='danger') {
  document.getElementById('confirmTitle').textContent = title;
  document.getElementById('confirmBody').textContent = body;
  const ok = document.getElementById('confirmOk');
  ok.textContent = label; ok.className = variant==='danger'?'btn-danger':'btn-primary';
  document.getElementById('confirmBackdrop').classList.add('open');
  return new Promise(res=>{ _confirmResolve=res; });
}
function resolveConfirm(v) { document.getElementById('confirmBackdrop').classList.remove('open'); _confirmResolve?.(v); _confirmResolve=null; }
document.getElementById('confirmCancel').onclick = ()=>resolveConfirm(false);
document.getElementById('confirmOk').onclick = ()=>resolveConfirm(true);
document.getElementById('confirmBackdrop').onclick = e=>{ if(e.target.id==='confirmBackdrop') resolveConfirm(false); };

const _globalInput = document.getElementById('globalCsvInput');
_globalInput.addEventListener('change', e => { handleImport(e); _globalInput.value = ''; });

render();
</script>
