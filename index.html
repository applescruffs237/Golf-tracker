  <script>
    const APP = Object.freeze({

  <title>Square Golf Tracker</title>
  <style>

<body>
  <div class="app">
    <div class="topbar">
      <div class="title-wrap">
        <div class="tag">Square Golf tracker</div>
        <h1>Foam → real ball session tracker</h1>
        <div class="subtitle">Clean, local, GitHub-hosted analysis for stock shots, misses, ceiling shots and directional reps.</div>
      </div>
      <div class="version-badge"><span id="headerVersion"></span></div>
    </div>

    <div class="tabs" id="topTabs"></div>

    <section class="screen active" id="screen-sessions"></section>
    <section class="screen" id="screen-clubs"></section>
    <section class="screen" id="screen-trends"></section>
    <section class="screen" id="screen-settings"></section>
  </div>

  <div class="fixed-nav">
    <div class="inner" id="bottomNav"></div>
  </div>

  <div class="modal-backdrop" id="modalBackdrop" aria-hidden="true">
    <div class="modal">
      <div class="row" style="margin-bottom:12px;">
        <h3 id="modalTitle">Shot details</h3>
        <button class="close-btn" id="closeModal">✕</button>
      </div>
      <div id="modalBody"></div>
    </div>
  </div>

<script>
document.title = `Square Golf Tracker v${APP.VERSION}`;
document.getElementById('headerVersion').textContent = `v${APP.VERSION}`;
console.log(`Square Golf Tracker v${APP.VERSION} (${APP.BUILD_DATE})`);

const DEFAULTS = {
  calibrationView: 'raw',
  selectedSessionId: null,
  selectedClubByScreen: {},
  lastImportedAt: null,
  settings: {
    performanceClubs: ['7i','8i','9i','PW','SW','UW'],
    directionalClubs: ['6i','5i','4H','3W','DR'],
    directionalThresholds: { good: 1.2, acceptable: 2.3 },
    performanceThresholds: { great: 2, stock: 5, playable: 8, miss: 11 },
    startDirectionPerformance: { great: 0.8, stock: 1.4, playable: 2.0, miss: 3.0 },
    ballSpeedSoftFloorPct: 0.92,
    useCalibratedTotal: true
  },
  calibration: {
    '5i': { bsMult: 1.26, carryPerMph: 1.42, totalFactor: 1.08, source: 'default' },
    '6i': { bsMult: 1.25, carryPerMph: 1.40, totalFactor: 1.07, source: 'default' },
    '7i': { bsMult: 1.24, carryPerMph: 1.38, totalFactor: 1.06, source: 'default' },
    '8i': { bsMult: 1.23, carryPerMph: 1.36, totalFactor: 1.05, source: 'default' },
    '9i': { bsMult: 1.22, carryPerMph: 1.34, totalFactor: 1.05, source: 'default' },
    'PW': { bsMult: 1.21, carryPerMph: 1.30, totalFactor: 1.04, source: 'default' },
    'UW': { bsMult: 1.20, carryPerMph: 1.26, totalFactor: 1.04, source: 'default' },
    'SW': { bsMult: 1.19, carryPerMph: 1.22, totalFactor: 1.03, source: 'default' },
    '4H': { bsMult: 1.26, carryPerMph: 1.42, totalFactor: 1.08, source: 'fallback 5i' },
    '3W': { bsMult: 1.26, carryPerMph: 1.42, totalFactor: 1.08, source: 'fallback 5i' },
    'DR': { bsMult: 1.26, carryPerMph: 1.42, totalFactor: 1.08, source: 'fallback 5i' }
  },
  sessions: []
};

let state = migrateState(loadState());
let currentTab = 'sessions';

function clone(obj) { return JSON.parse(JSON.stringify(obj)); }
function loadState() {
  try {
    const raw = localStorage.getItem(APP.STORAGE_KEY);
    if (!raw) return clone(DEFAULTS);
    const parsed = JSON.parse(raw);
    return deepMerge(clone(DEFAULTS), parsed);
  } catch (e) {
    console.warn('Failed to load state', e);
    return clone(DEFAULTS);
  }
}
function migrateState(loaded) {
  const next = clone(loaded);
  if (!next.settings) next.settings = clone(DEFAULTS.settings);
  if (!next.calibration) next.calibration = clone(DEFAULTS.calibration);
  for (const club of Object.keys(next.calibration)) {
    const cal = next.calibration[club] || {};
    if (!Number.isFinite(cal.bsMult)) {
      if (Number.isFinite(cal.ballSpeedMultiplier)) cal.bsMult = cal.ballSpeedMultiplier;
      else cal.bsMult = DEFAULTS.calibration[club]?.bsMult ?? 1;
    }
    if (!Number.isFinite(cal.carryPerMph)) {
      if (Number.isFinite(cal.carryMultiplier) && Number.isFinite(cal.bsMult) && cal.bsMult !== 0) cal.carryPerMph = cal.carryMultiplier / cal.bsMult;
      else cal.carryPerMph = DEFAULTS.calibration[club]?.carryPerMph ?? 1.35;
    }
    if (!Number.isFinite(cal.totalFactor)) {
      if (Number.isFinite(cal.totalMultiplier) && Number.isFinite(cal.carryMultiplier) && cal.carryMultiplier !== 0) cal.totalFactor = cal.totalMultiplier / cal.carryMultiplier;
      else cal.totalFactor = DEFAULTS.calibration[club]?.totalFactor ?? 1.05;
    }
    if (!cal.source) cal.source = DEFAULTS.calibration[club]?.source ?? 'migrated';
    delete cal.ballSpeedMultiplier;
    delete cal.carryMultiplier;
    delete cal.totalMultiplier;
    next.calibration[club] = cal;
  }
  next.calibrationModel = APP.CALIBRATION_MODEL;
  return next;
}
function deepMerge(base, incoming) {
  if (Array.isArray(base)) return Array.isArray(incoming) ? incoming : base;
  const output = { ...base };
  for (const key of Object.keys(incoming || {})) {
    const baseVal = base?.[key];
    const inVal = incoming[key];
    if (baseVal && typeof baseVal === 'object' && !Array.isArray(baseVal) && inVal && typeof inVal === 'object' && !Array.isArray(inVal)) {
      output[key] = deepMerge(baseVal, inVal);
    } else {
      output[key] = inVal;
    }
  }
  return output;
}
function saveState() {
  localStorage.setItem(APP.STORAGE_KEY, JSON.stringify(state));
}

function formatDate(dateStr) {
  if (!dateStr) return 'Unknown date';
  const [y,m,d] = dateStr.split('-');
  const dt = new Date(Number(y), Number(m)-1, Number(d));
  return dt.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
}
function escapeHtml(str='') {
  return String(str).replace(/[&<>"]/g, s => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[s]));
}
function slugClub(club) { return club.replace(/[^a-z0-9]/gi,''); }
function normaliseClub(input) {
  const value = String(input || '').trim().toLowerCase();
  const map = {
    '7 iron': '7i', '8 iron': '8i', '9 iron': '9i', '6 iron': '6i', '5 iron': '5i',
    'pitching wedge': 'PW', 'pw': 'PW', 'pw (44°)': 'PW', 'pw (44)': 'PW',
    'uw': 'UW', 'uw (49°)': 'UW', 'uw (49)': 'UW',
    'sw': 'SW', 'sw (~54°)': 'SW', 'sw (~54)': 'SW', 'sand wedge': 'SW',
    '3 wood': '3W', '3w': '3W', '4 hybrid': '4H', '4h': '4H',
    'driver': 'DR', 'dr': 'DR'
  };
  if (map[value]) return map[value];
  const match = value.match(/^(\d)\s*iron$/);
  if (match) return `${match[1]}i`;
  return String(input || '').trim();
}
function clubMode(club) {
  if (state.settings.performanceClubs.includes(club)) return 'performance';
  if (state.settings.directionalClubs.includes(club)) return 'directional';
  return 'performance';
}
function getCalibration(club) {
  return state.calibration[club] || { bsMult: 1, carryPerMph: 1.35, totalFactor: 1.05, source: 'fallback' };
}
function getMetricValue(shot, key, view = state.calibrationView) {
  const raw = shot[key];
  if (raw == null || Number.isNaN(raw)) return null;
  if (view === 'raw') return raw;
  const cal = getCalibration(shot.club);
  const estimatedBallSpeed = Number.isFinite(shot.ballSpeed) ? shot.ballSpeed * (cal.bsMult || 1) : null;
  if (key === 'ballSpeed') return estimatedBallSpeed;
  if (key === 'carry') return Number.isFinite(estimatedBallSpeed) ? estimatedBallSpeed * (cal.carryPerMph || 1) : null;
  if (key === 'total') {
    const estimatedCarry = Number.isFinite(estimatedBallSpeed) ? estimatedBallSpeed * (cal.carryPerMph || 1) : null;
    return Number.isFinite(estimatedCarry) ? estimatedCarry * (cal.totalFactor || 1) : null;
  }
  return raw;
}
function sortNums(nums) { return [...nums].filter(v => Number.isFinite(v)).sort((a,b)=>a-b); }
function median(nums) {
  const a = sortNums(nums); if (!a.length) return null; const mid = Math.floor(a.length / 2); return a.length % 2 ? a[mid] : (a[mid-1] + a[mid]) / 2;
}
function percentile(nums, pct) {
  const a = sortNums(nums); if (!a.length) return null; const idx = (a.length - 1) * pct; const lo = Math.floor(idx), hi = Math.ceil(idx); if (lo === hi) return a[lo]; return a[lo] + (a[hi] - a[lo]) * (idx - lo);
}
function rangeText(min, max, digits = 0, suffix = '') {
  if (!Number.isFinite(min) || !Number.isFinite(max)) return '—';
  return `${formatNum(min, digits)}–${formatNum(max, digits)}${suffix}`;
}
function formatNum(value, digits = 0) {
  if (!Number.isFinite(value)) return '—';
  return Number(value).toFixed(digits).replace(/\.0+$/,'');
}
function signDir(value, digits = 1) {
  if (!Number.isFinite(value)) return '—';
  if (Math.abs(value) < 0.05) return '0';
  return `${value > 0 ? 'R' : 'L'}${formatNum(Math.abs(value), digits)}°`;
}
function absoluteMedian(shots, key, view) {
  return median(shots.map(s => {
    const v = getMetricValue(s, key, view);
    return Number.isFinite(v) ? Math.abs(v) : null;
  }));
}
function metricMedian(shots, key, view) {
  return median(shots.map(s => getMetricValue(s, key, view)));
}
function metricPercentile(shots, key, pct, view, absolute=false) {
  return percentile(shots.map(s => {
    const v = getMetricValue(s, key, view);
    return Number.isFinite(v) ? (absolute ? Math.abs(v) : v) : null;
  }), pct);
}
function faceToPath(shot) {
  if (!Number.isFinite(shot.faceAngle) || !Number.isFinite(shot.clubPath)) return null;
  return shot.faceAngle - shot.clubPath;
}
function clubSessionsMap() {
  const map = {};
  state.sessions.forEach(session => {
    session.shots.forEach(shot => {
      if (!map[shot.club]) map[shot.club] = [];
      map[shot.club].push({ ...shot, sessionId: session.id, sessionDate: session.date, sessionName: session.name });
    });
  });
  return map;
}

function classifyPerformanceShots(shots, view = state.calibrationView) {
  const thresholds = state.settings.performanceThresholds;
  const startT = state.settings.startDirectionPerformance;
  const absOfflineVals = shots.map(s => Math.abs(getMetricValue(s, 'offline', view))).filter(Number.isFinite);
  const ballVals = shots.map(s => getMetricValue(s, 'ballSpeed', view)).filter(Number.isFinite);
  const pathVals = shots.map(s => s.clubPath).filter(Number.isFinite);
  const faceVals = shots.map(s => s.faceAngle).filter(Number.isFinite);
  const ftpVals = shots.map(s => faceToPath(s)).filter(Number.isFinite);

  const medBall = median(ballVals);
  const pathMed = median(pathVals);
  const faceMed = median(faceVals);
  const ftpMed = median(ftpVals);

  return shots.map(shot => {
    const absOffline = Math.abs(getMetricValue(shot, 'offline', view) ?? 0);
    const absStart = Math.abs(getMetricValue(shot, 'startDirection', view) ?? 0);
    const ball = getMetricValue(shot, 'ballSpeed', view);
    const path = shot.clubPath;
    const face = shot.faceAngle;
    const ftp = faceToPath(shot);

    const strongBall = Number.isFinite(ball) && Number.isFinite(medBall) ? ball >= medBall : false;
    const weakBall = Number.isFinite(ball) && Number.isFinite(medBall) ? ball < medBall * state.settings.ballSpeedSoftFloorPct : false;
    const pathClose = Number.isFinite(path) && Number.isFinite(pathMed) ? Math.abs(path - pathMed) <= 1.25 : true;
    const faceClose = Number.isFinite(face) && Number.isFinite(faceMed) ? Math.abs(face - faceMed) <= 1.25 : true;
    const ftpClose = Number.isFinite(ftp) && Number.isFinite(ftpMed) ? Math.abs(ftp - ftpMed) <= 1.25 : true;

    let cls = 'warning';
    if (absOffline >= thresholds.miss || absStart >= startT.miss || weakBall) cls = 'miss';
    else if (absOffline <= thresholds.great && absStart <= startT.great && strongBall && pathClose && faceClose && ftpClose) cls = 'great';
    else if (absOffline <= thresholds.stock && absStart <= startT.stock && pathClose && faceClose && ftpClose) cls = 'stock';
    else if (absOffline <= thresholds.playable && absStart <= startT.playable) cls = 'playable';
    else cls = 'warning';

    const quality =
      (Math.max(0, 1 - absOffline / thresholds.miss) * 40) +
      (Math.max(0, 1 - absStart / startT.miss) * 30) +
      ((Number.isFinite(ball) && Number.isFinite(medBall)) ? Math.min(1.25, ball / medBall) * 20 : 10) +
      (pathClose ? 4 : 0) + (faceClose ? 3 : 0) + (ftpClose ? 3 : 0);

    return { ...shot, classification: cls, qualityScore: quality, absOffline, absStart };
  }).sort((a,b)=>a.index-b.index);
}
function classifyDirectionalShots(shots) {
  const { good, acceptable } = state.settings.directionalThresholds;
  return shots.map(shot => {
    const absStart = Math.abs(shot.startDirection ?? 0);
    let cls = 'miss';
    if (absStart <= good) cls = 'good';
    else if (absStart <= acceptable) cls = 'acceptable';
    const quality = Math.max(0, 100 - (absStart * 30));
    return { ...shot, classification: cls, qualityScore: quality, absStart };
  }).sort((a,b)=>a.index-b.index);
}
function getClassColor(cls) {
  return ({ great:'var(--good)', stock:'var(--stock)', playable:'var(--playable)', warning:'var(--warn)', miss:'var(--miss)', good:'var(--good)', acceptable:'var(--playable)' })[cls] || '#999';
}
function niceClassName(cls) {
  return ({ great:'Great', stock:'Stock', playable:'Playable', warning:'Loose', miss:'Miss', good:'Good rep', acceptable:'Acceptable rep' })[cls] || cls;
}

function sessionClubStats(session, club, view = state.calibrationView) {
  const shots = session.shots.filter(s => s.club === club);
  const mode = clubMode(club);
  const classified = mode === 'performance' ? classifyPerformanceShots(shots, view) : classifyDirectionalShots(shots);
  return computeStats(classified, club, view);
}
function computeStats(classifiedShots, club, view = state.calibrationView) {
  const mode = clubMode(club);
  const shots = classifiedShots;
  const total = shots.length;
  const byClass = shots.reduce((acc, s) => { acc[s.classification] = (acc[s.classification] || 0) + 1; return acc; }, {});
  const carryMed = metricMedian(shots, 'carry', view);
  const totalMed = metricMedian(shots, 'total', view);
  const ballMed = metricMedian(shots, 'ballSpeed', view);
  const absOfflineMed = absoluteMedian(shots, 'offline', view);
  const startMed = metricMedian(shots, 'startDirection', view);
  const startVals = shots.map(s => getMetricValue(s, 'startDirection', view)).filter(Number.isFinite);
  const startSpread = startVals.length ? (Math.max(...startVals) - Math.min(...startVals)) : null;
  const pathMed = median(shots.map(s=>s.clubPath).filter(Number.isFinite));
  const faceMed = median(shots.map(s=>s.faceAngle).filter(Number.isFinite));
  const ftpMed = median(shots.map(s=>faceToPath(s)).filter(Number.isFinite));
  const sortedByQuality = [...shots].sort((a,b)=>b.qualityScore-a.qualityScore);
  const representative = sortedByQuality.find(s => mode === 'performance' ? ['stock','playable','great'].includes(s.classification) : ['good','acceptable'].includes(s.classification)) || sortedByQuality[0] || null;
  const ceiling = sortedByQuality[0] || null;
  const stockShots = shots.filter(s => s.classification === 'stock');
  const fingerprintShots = stockShots.length >= 3 ? stockShots : shots.filter(s => mode === 'performance' ? ['great','stock','playable'].includes(s.classification) : ['good','acceptable'].includes(s.classification));
  return {
    club, mode, total, byClass, shots,
    carryMed, totalMed, ballMed, absOfflineMed, startMed, startSpread,
    pathMed, faceMed, ftpMed, representative, ceiling,
    fingerprint: {
      carryLo: metricPercentile(fingerprintShots, 'carry', .25, view),
      carryHi: metricPercentile(fingerprintShots, 'carry', .75, view),
      ballLo: metricPercentile(fingerprintShots, 'ballSpeed', .25, view),
      ballHi: metricPercentile(fingerprintShots, 'ballSpeed', .75, view),
      startLo: percentile(fingerprintShots.map(s => s.startDirection).filter(Number.isFinite), .25),
      startHi: percentile(fingerprintShots.map(s => s.startDirection).filter(Number.isFinite), .75),
      offHi: metricPercentile(fingerprintShots, 'offline', .75, view, true),
      pathLo: percentile(fingerprintShots.map(s => s.clubPath).filter(Number.isFinite), .25),
      pathHi: percentile(fingerprintShots.map(s => s.clubPath).filter(Number.isFinite), .75),
      faceLo: percentile(fingerprintShots.map(s => s.faceAngle).filter(Number.isFinite), .25),
      faceHi: percentile(fingerprintShots.map(s => s.faceAngle).filter(Number.isFinite), .75),
      ftpLo: percentile(fingerprintShots.map(s => faceToPath(s)).filter(Number.isFinite), .25),
      ftpHi: percentile(fingerprintShots.map(s => faceToPath(s)).filter(Number.isFinite), .75)
    }
  };
}

function parseDirectional(str) {
  if (str == null || str === '') return null;
  const s = String(str).trim();
  if (/^[LR]/i.test(s)) {
    const dir = s[0].toUpperCase() === 'R' ? 1 : -1;
    const num = parseFloat(s.slice(1));
    return Number.isFinite(num) ? dir * num : null;
  }
  const num = parseFloat(s);
  return Number.isFinite(num) ? num : null;
}
function parseCsv(fileText, fileName='Imported CSV') {
  const lines = fileText.replace(/\r/g,'').split('\n').filter((l, idx, arr) => !(idx === arr.length - 1 && l.trim() === ''));
  const metaLine = lines[0] || '';
  const headerIndex = lines.findIndex(line => /^Club,Index,/i.test(line));
  if (headerIndex < 0) throw new Error('Could not find Square Golf header row.');
  const header = lines[headerIndex].split(',').map(h => h.trim());
  const dataLines = lines.slice(headerIndex + 1).filter(Boolean);
  const sessionDate = deriveSessionDate(metaLine, fileName);
  const location = deriveLocation(metaLine);
  const shots = dataLines.map(line => parseCsvLine(line, header)).filter(Boolean);
  const id = `session_${Date.now()}_${Math.random().toString(36).slice(2,7)}`;
  const clubsUsed = [...new Set(shots.map(s=>s.club))];
  return {
    id,
    date: sessionDate,
    name: location || 'Indoor session',
    importedAt: new Date().toISOString(),
    fileName,
    clubsUsed,
    shots
  };
}
function parseCsvLine(line, header) {
  const cols = line.split(',');
  if (!cols.length || !cols[0]) return null;
  const byHeader = Object.fromEntries(header.map((h, i) => [h, cols[i] ?? '']));
  const shot = {
    club: normaliseClub(byHeader['Club']),
    index: Number(byHeader['Index']),
    ballSpeed: num(byHeader['Ball Speed(mph)']),
    startDirection: parseDirectional(byHeader['Launch Direction']),
    launchAngle: num(byHeader['Launch Angle']),
    spinRate: num(byHeader['Spin Rate']),
    spinAxis: num(byHeader['Spin Axis']),
    backSpin: num(byHeader['Back Spin']),
    sideSpin: num(byHeader['Side Spin']),
    apex: num(byHeader['Apex(yd)']),
    carry: num(byHeader['Carry(yd)']),
    total: num(byHeader['Total(yd)']),
    offline: parseDirectional(byHeader['Offline(yd)']),
    landingAngle: num(byHeader['Landing Angle']),
    clubPath: parseDirectional(byHeader['Club Path']),
    faceAngle: parseDirectional(byHeader['Face Angle']),
    attackAngle: num(byHeader['Attack Angle']),
    dynamicLoft: num(byHeader[' Dynamic Loft'] ?? byHeader['Dynamic Loft'])
  };
  if (!shot.club) return null;
  return shot;
}
function num(value) {
  const n = parseFloat(value);
  return Number.isFinite(n) ? n : null;
}
function deriveSessionDate(metaLine, fileName) {
  const joined = `${metaLine} ${fileName}`;
  const m = joined.match(/(\d{2})-(\d{2})-(\d{4})/);
  if (m) return `${m[3]}-${m[1]}-${m[2]}`;
  return new Date().toISOString().slice(0,10);
}
function deriveLocation(metaLine) {
  const match = metaLine.match(/Place,([^,]+)/i);
  return match ? match[1].trim() : '';
}

function buildSessionSummary(session) {
  const perfClubs = session.clubsUsed.filter(c => clubMode(c)==='performance');

function metricHtml(label, value) {

function percent(num, den) {
  if (!den) return '—';
  return `${Math.round((num/den)*100)}%`;
}
function buildInsightsForSession(session) {
  const insights = [];
  const perfClubs = session.clubsUsed.filter(c => clubMode(c)==='performance');
  const dirClubs = session.clubsUsed.filter(c => clubMode(c)==='directional');
  const perfStats = perfClubs.map(c => sessionClubStats(session, c, state.calibrationView)).sort((a,b)=>(b.byClass.stock||0)+(b.byClass.great||0) - ((a.byClass.stock||0)+(a.byClass.great||0)));
  if (perfStats[0]) {
    insights.push({
      title: `${perfStats[0].club} looked most settled`,
      body: `Stock+ rate ${percent((perfStats[0].byClass.stock||0)+(perfStats[0].byClass.great||0), perfStats[0].total)} with ${formatNum(perfStats[0].absOfflineMed,1)} yd median absolute offline.`
    });
  }
  const biggestMiss = perfStats.slice().sort((a,b)=>(b.byClass.miss||0)-(a.byClass.miss||0))[0];
  if (biggestMiss) {
    insights.push({
      title: `Miss pattern detected on ${biggestMiss.club}`,
      body: `Miss rate ${percent(biggestMiss.byClass.miss||0, biggestMiss.total)}. Start direction spread sat around ${formatNum(biggestMiss.startSpread,1)}°.`
    });
  }
  const dir = dirClubs.map(c => sessionClubStats(session, c, 'raw')).sort((a,b)=>(b.byClass.good||0)-(a.byClass.good||0))[0];
  if (dir) {
    insights.push({
      title: `${dir.club} directional work`,
      body: `Good reps ${percent(dir.byClass.good||0, dir.total)} with median start ${signDir(dir.startMed,1)}.`
    });
  }
  if (!insights.length) insights.push({ title: 'Ready for import', body: 'Import a CSV to see your trend cards and session takeaways.' });
  return insights.slice(0,4);
}

function renderDispersionPlot(stats, sessionId) {
  const shots = stats.shots;
  if (!shots.length) return '<div class="empty">No shots available.</div>';
  const width = 700, height = 360, pad = 36;
  const xMax = Math.max(15, Math.ceil(Math.max(...shots.map(s=>Math.abs(getMetricValue(s,'offline', state.calibrationView)||0))) + 2));
  const yMax = Math.max(40, Math.ceil(Math.max(...shots.map(s=>getMetricValue(s,'carry', state.calibrationView)||0)) + 8));
  const x = v => pad + ((v + xMax) / (xMax * 2)) * (width - pad*2);
  const y = v => height - pad - (v / yMax) * (height - pad*2);
  const corridor = state.settings.performanceThresholds.playable;
  const svg = `
    <svg class="plot" viewBox="0 0 ${width} ${height}" role="img" aria-label="Dispersion plot">
      <rect x="0" y="0" width="${width}" height="${height}" fill="#fff" rx="14" />
      <rect x="${x(-corridor)}" y="${y(yMax)}" width="${x(corridor)-x(-corridor)}" height="${y(0)-y(yMax)}" fill="#f8fbff" />

function percentageNumber(num, den) { return den ? Math.round((num/den)*100) : null; }
function trendCard(title, values, labels, suffix='') {
  const filtered = values.map(v => Number.isFinite(v) ? v : null);
  const points = sparklinePoints(filtered, 320, 120, 18);
  const latest = filtered[filtered.length-1];
  const first = filtered.find(v => v != null);
  const delta = Number.isFinite(latest) && Number.isFinite(first) ? latest - first : null;
  const deltaText = delta == null ? '—' : `${delta > 0 ? '↑' : delta < 0 ? '↓' : '→'} ${formatNum(Math.abs(delta), suffix==='mph' ? 1 : 0)}${suffix}`;
  return `
    <div class="metric">
      <div class="label">${escapeHtml(title)}</div>
      <div class="value">${Number.isFinite(latest) ? `${formatNum(latest, suffix==='mph'||suffix==='°' ? 1 : 0)}${suffix}` : '—'}</div>
      <div class="footer-note">Change vs first tracked session: ${deltaText}</div>
      <div class="plot-box" style="padding:6px; margin-top:10px;">
        <svg class="plot" viewBox="0 0 320 120">
          <polyline points="${points.line}" fill="none" stroke="#222" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
          ${points.circles}
        </svg>
      </div>
    </div>`;
}
function sparklinePoints(values, width, height, pad) {
  const finite = values.filter(v => Number.isFinite(v));
  if (!finite.length) return { line:'', circles:'' };
  const min = Math.min(...finite), max = Math.max(...finite);
  const span = max - min || 1;
  const usableW = width - pad * 2, usableH = height - pad * 2;
  const coords = values.map((v, i) => {
    if (!Number.isFinite(v)) return null;
    const x = pad + (i / Math.max(1, values.length - 1)) * usableW;
    const y = height - pad - ((v - min) / span) * usableH;
    return { x, y, v };
  }).filter(Boolean);
  return {
    line: coords.map(p => `${p.x},${p.y}`).join(' '),
    circles: coords.map(p => `<circle cx="${p.x}" cy="${p.y}" r="3.5" fill="#3a7afe" />`).join('')
  };
}

function handleCsvImport(event) {
  const file = event.target.files?.[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const session = parseCsv(String(e.target.result || ''), file.name);
      state.sessions.push(session);
      state.selectedSessionId = session.id;
      state.lastImportedAt = new Date().toISOString();
      render();
    } catch (err) {
      alert(`Import failed: ${err.message}`);
    } finally {
      event.target.value = '';
    }
  };
  reader.readAsText(file);
}
function exportState() {
  const payload = {
    appVersion: APP.VERSION,
    buildDate: APP.BUILD_DATE,
    exportedAt: new Date().toISOString(),
    state
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = APP.EXPORT_FILENAME();
  a.click();
  URL.revokeObjectURL(url);
}
function handleJsonImport(event) {
  const file = event.target.files?.[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const parsed = JSON.parse(String(e.target.result || '{}'));
      if (!parsed.state) throw new Error('Backup file did not include state.');
      state = deepMerge(clone(DEFAULTS), parsed.state);
      render();
    } catch (err) {
      alert(`Backup import failed: ${err.message}`);
    } finally {
      event.target.value = '';
    }
  };
  reader.readAsText(file);
}

function findShot(sessionId, club, index) {
  const session = state.sessions.find(s=>s.id===sessionId) || state.sessions.find(s => s.shots.some(sh=>sh.club===club && sh.index===Number(index)));
  if (!session) return null;
  const shot = session.shots.find(sh => sh.club===club && sh.index===Number(index));
  return shot ? { session, shot } : null;
}

      ${rows.map(([label, value]) => `<div class="metric"><div class="label">${escapeHtml(label)}</div><div class="value" style="font-size:18px;">${escapeHtml(String(value))}</div></div>`).join('')}
    </div>`;
  document.getElementById('modalBackdrop').classList.add('open');
  document.getElementById('modalBackdrop').setAttribute('aria-hidden','false');
}
function foundMetric(shot, key) {
  return getMetricValue(shot, key, clubMode(shot.club)==='performance' ? state.calibrationView : 'raw');
}
window.openShotModal = openShotModal;

document.getElementById('closeModal').onclick = closeModal;
document.getElementById('modalBackdrop').onclick = e => { if (e.target.id === 'modalBackdrop') closeModal(); };
function closeModal() {
  document.getElementById('modalBackdrop').classList.remove('open');
  document.getElementById('modalBackdrop').setAttribute('aria-hidden','true');
}

document.addEventListener('click', e => {
  const target = e.target.closest('[data-shot-open="1"]');
  if (!target) return;
  openShotModal(target.dataset.sessionId, target.dataset.club, target.dataset.index);
});
document.addEventListener('click', e => {
  const btn = e.target.closest('[data-session-club]');
  if (!btn) return;
  state.selectedClubByScreen.sessions = btn.dataset.sessionClub;
  render();
});

render();
</script>
</body>
</html>
